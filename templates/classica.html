<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:1080px;height:1920px;background:linear-gradient(135deg,{bg1},{bg2});position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;font-family:Arial Black,Arial,sans-serif;color:#fff}
.top-banner{width:100%;padding:60px 80px 40px;text-align:center}
.top-banner h1{font-size:64px;font-weight:900;text-transform:uppercase;letter-spacing:4px;background:linear-gradient(90deg,{accent1},{accent2});-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-banner .sub{font-size:28px;color:rgba(255,255,255,.6);margin-top:10px;letter-spacing:8px;text-transform:uppercase}
.product-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px}
.product-area .price{font-size:{price_size}px;font-weight:900;line-height:1;background:linear-gradient(180deg,{accent1},{accent2});-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.product-area .price .cents{font-size:{price_cents_size}px;vertical-align:super}
.product-area .unit{font-size:30px;color:rgba(255,255,255,.5);margin-top:20px;text-transform:uppercase;letter-spacing:4px}
.product-area .desc{font-size:40px;font-weight:700;text-align:center;margin-top:40px;line-height:1.3}
.product-area .old-price{font-size:32px;color:#ff4444;text-decoration:line-through;margin-top:20px}
.bottom-info{width:100%;padding:40px 80px 60px;text-align:center;border-top:2px solid rgba(255,255,255,.1)}
.bottom-info .store{font-size:26px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.bottom-info .validity{font-size:22px;color:rgba(255,255,255,.3);margin-top:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim-title{animation:fadeUp .8s ease-out both}
.anim-sub{animation:fadeIn .6s ease-out both}
.anim-price{animation:fadeUp .8s ease-out both}
.anim-desc{animation:fadeUp .6s ease-out both}
.anim-store{animation:fadeIn .5s ease-out both}
</style>
</head>
<body>
<div class="card" data-composition-id="cartela" data-width="1080" data-height="1920" data-duration="{duration}" data-start="0">
<div class="top-banner">
<h1 class="anim-title" style="animation-delay:.5s">{banner_title}</h1>
<div class="sub anim-sub" style="animation-delay:1s">{banner_sub}</div>
</div>
<div class="product-area">
<div class="price anim-price" style="animation-delay:0s">R$ <span class="cents">{price_int}</span>,{price_dec}</div>
<div class="unit anim-sub" style="animation-delay:1.2s">{unit}</div>
<div class="desc anim-desc" style="animation-delay:1.5s">{product_name}<br>{product_detail}</div>
<div class="old-price" style="font-size:32px;color:#ff4444;text-decoration:line-through;margin-top:20px">De: R$ {old_price}</div>
</div>
<div class="bottom-info">
<div class="store anim-store" style="animation-delay:2s">{store_name}</div>
<div class="validity anim-store" style="animation-delay:2.5s">{validity}</div>
</div>
</div>
</body>
</html>
