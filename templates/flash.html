<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:1080px;height:1920px;background:linear-gradient(135deg,{bg1},{bg2});position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;font-family:Arial Black,Arial,sans-serif;color:#fff}
.tag{position:absolute;top:40px;right:-60px;background:{accent1};color:#fff;font-size:28px;font-weight:900;padding:15px 100px;transform:rotate(45deg);text-transform:uppercase;letter-spacing:2px}
.product-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px}
.product-area .price{font-size:{price_size}px;font-weight:900;line-height:1;color:{accent1};text-shadow:0 0 40px rgba(255,200,0,.3)}
.product-area .price .cents{font-size:{price_cents_size}px;vertical-align:super}
.product-area .unit{font-size:30px;color:rgba(255,255,255,.5);margin-top:20px;text-transform:uppercase;letter-spacing:4px}
.product-area .desc{font-size:42px;font-weight:700;text-align:center;margin-top:40px;line-height:1.3;color:{accent1}}
.product-area .old-price{font-size:32px;color:#ff4444;text-decoration:line-through;margin-top:20px}
.bottom-info{width:100%;padding:30px 60px 50px;text-align:center;border-top:2px solid rgba(255,255,255,.1)}
.bottom-info .store{font-size:26px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.bottom-info .validity{font-size:22px;color:rgba(255,255,255,.3);margin-top:8px}
@keyframes zoomIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes tagIn{from{opacity:0;transform:rotate(45deg) translateX(80px)}to{opacity:1;transform:rotate(45deg) translateX(0)}}
.anim-tag{animation:tagIn .5s ease-out both}
.anim-price{animation:zoomIn .8s ease-out both}
.anim-desc{animation:slideIn .6s ease-out both}
.anim-store{animation:fadeIn .5s ease-out both}
</style>
</head>
<body>
<div class="card" data-composition-id="cartela" data-width="1080" data-height="1920" data-duration="{duration}" data-start="0">
<div class="tag anim-tag" style="animation-delay:.3s">{tag_text}</div>
<div class="product-area">
<div class="price anim-price" style="animation-delay:0s">R$ <span class="cents">{price_int}</span>,{price_dec}</div>
<div class="unit anim-sub" style="animation-delay:.8s">{unit}</div>
<div class="desc anim-desc" style="animation-delay:1s">{product_name}<br>{product_detail}</div>
<div class="old-price" style="animation-delay:1.2s">De: R$ {old_price}</div>
</div>
<div class="bottom-info">
<div class="store anim-store" style="animation-delay:1.5s">{store_name}</div>
<div class="validity anim-store" style="animation-delay:2s">{validity}</div>
</div>
</div>
</body>
</html>
